<body>

      <div class="page-nav__inner container">

          <svg viewBox="0 0 44 44" width="40" height="40" aria-hidden="true"><g fill="none" stroke="#F58230" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M10 14 H15 L19 29 H33"/><path d="M15 18 H34 L31.5 27 H19"/></g><path d="M18 33 Q25 38 34 32" stroke="#00A858" stroke-width="3" fill="none" stroke-linecap="round"/><circle cx="21" cy="35" r="2.4" fill="#F58230"/><circle cx="30" cy="35" r="2.4" fill="#F58230"/></svg>

        <nav class="page-nav__actions" aria-label="Page">

          <a href="login.html" class="page-nav__link page-nav__link--hide">Sign in</a>
        </nav>
      </div>
    </header>

    <!-- ══ hero ══ -->
    <section class="page-hero">
      <div class="container page-hero__inner">
        <p class="page-hero__eyebrow">Almost there</p>
        <h1 class="page-hero__title">Checkout</h1>
        <p class="page-hero__sub">Tell us where to deliver, review your order, and place it. Payment is arranged on delivery for now.</p>
      </div>
    </section>

    <!-- ══ checkout ══ -->
    <section class="checkout-section">
      <div class="container">
        <div id="checkoutRoot">
          <div class="cart-state">
            <svg viewBox="0 0 24 24" width="34" height="34" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/></svg>

        </div>
      </div>

    <!-- ══ footer ══ -->
    <footer class="page-foot">
      <div class="page-foot__inner container">
        <span>© <span id="year">2026</span> Kings Food Mart · RC 8980702</span>
        <span class="page-foot__spacer"></span>
        <nav class="page-foot__links" aria-label="Legal">
          <a href="index.html">Home</a>
          <a href="privacy.html">Privacy</a>
